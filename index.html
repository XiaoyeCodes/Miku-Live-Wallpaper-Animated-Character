<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Summer Beach Time-Lapse</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="wallpaper" class="wallpaper motion-enabled" aria-hidden="true">
      <div id="sceneA" class="scene-layer"></div>
      <div id="sceneB" class="scene-layer"></div>

      <div class="sky-haze"></div>
      <div class="cloud-field cloud-field-far"></div>
      <div class="cloud-field cloud-field-near"></div>
      <div class="night-stars"></div>
      <div class="sun-bloom"></div>
      <div class="morning-mist"></div>

      <div class="subject-rig">
        <div class="subject-sway"></div>
        <div class="hair-motion hair-left"></div>
        <div class="hair-motion hair-right"></div>
        <div class="skirt-motion"></div>
        <div class="breath-light"></div>
        <div class="blink blink-left"></div>
        <div class="blink blink-right"></div>
      </div>

      <div class="water-tide"></div>
      <div class="water-shimmer"></div>
      <div class="water-glints"></div>
      <div class="reflection-ripple"></div>
      <div class="soft-vignette"></div>
      <div id="debug" class="debug-panel"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
